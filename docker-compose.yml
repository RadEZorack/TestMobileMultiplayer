services:
  postgres:
    image: postgres:16-alpine
    container_name: test-mobile-multiplayer-postgres
    environment:
      POSTGRES_DB: mobile_multiplayer
      POSTGRES_USER: game
      POSTGRES_PASSWORD: game_dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U game -d mobile_multiplayer"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    container_name: test-mobile-multiplayer-nginx
    environment:
      APP_DOMAIN: ${APP_DOMAIN:-dev.augmego.ca}
    ports:
      - "80:80"
      - "7777:7777/udp"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/templates:/etc/nginx/templates:ro
      - ./nginx/stream.d:/etc/nginx/stream.d:ro
    restart: unless-stopped

volumes:
  postgres-data:
