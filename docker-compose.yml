services:
  postgres:
    image: postgres:16-alpine
    container_name: test-mobile-multiplayer-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-mobile_multiplayer}
      POSTGRES_USER: ${POSTGRES_USER:-game}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-game_dev_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  game-server:
    build:
      context: .
      dockerfile: Server/BasicUdpGameServer/Dockerfile
    container_name: test-mobile-multiplayer-game-server
    environment:
      GAME_DATABASE_URL: "Host=postgres;Port=5432;Database=${POSTGRES_DB:-mobile_multiplayer};Username=${POSTGRES_USER:-game};Password=${POSTGRES_PASSWORD:-game_dev_password};Include Error Detail=true"
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "7777/udp"
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    container_name: test-mobile-multiplayer-nginx
    environment:
      APP_DOMAIN: ${APP_DOMAIN:-dev.augmego.ca}
    ports:
      - "80:80"
      - "7777:7777/udp"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/templates:/etc/nginx/templates:ro
      - ./nginx/stream.d:/etc/nginx/stream.d:ro
    depends_on:
      game-server:
        condition: service_started
    restart: unless-stopped

volumes:
  postgres-data:
